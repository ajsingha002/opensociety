<div class="min-h-screen flex items-center justify-center py-10 px-4 bg-gray-50 font-[DM_Sans]">

    <div class="w-full max-w-[420px]">

        <!-- Brand header -->
        <div class="text-center mb-8">
            <div class="w-12 h-12 rounded-[14px] bg-[#2C2C2A] inline-flex items-center justify-center mb-5">
                <svg width="22" height="22" fill="none" viewBox="0 0 24 24">
                    <path d="M3 9.5L12 4l9 5.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z" stroke="#D3D1C7" stroke-width="1.5"
                        stroke-linejoin="round" />
                    <path d="M9 21V12h6v9" stroke="#D3D1C7" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </div>
            <h1 class="font-['DM_Serif_Display'] text-[28px] font-normal text-gray-900 tracking-[-0.3px] mb-1.5">
                Welcome back
            </h1>
            <p class="text-sm text-gray-500 font-light">
                Manage your residence and book society amenities
            </p>
        </div>

        <!-- Card -->
        <div class="bg-white border border-gray-200/60 rounded-[20px] p-8">

            <!-- Error message -->
            <div *ngIf="errorMessage" class="mb-5 px-3.5 py-2.5 bg-red-50 border border-red-200 rounded-[10px]">
                <p class="text-[13px] text-red-700 font-medium">{{ errorMessage }}</p>
            </div>

            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">

                <!-- Username -->
                <div>
                    <label class="block text-[13px] font-medium text-gray-500 mb-1.5 tracking-[0.2px]">
                        Username
                    </label>
                    <input formControlName="username" type="text" autocomplete="username"
                        [class.border-red-400]="isFieldInvalid('username')" class="w-full h-11 border border-gray-200 rounded-[10px] px-3.5 text-sm text-gray-900 bg-white outline-none transition-all
                     focus:border-[#2C2C2A] focus:ring-2 focus:ring-[#2C2C2A]/[0.07]">
                    <p *ngIf="isFieldInvalid('username')" class="mt-1.5 text-[12px] text-red-600 font-medium">
                        Username is required
                    </p>
                </div>

                <!-- Password -->
                <div>
                    <div class="flex items-center justify-between mb-1.5">
                        <label class="block text-[13px] font-medium text-gray-500 tracking-[0.2px]">
                            Password
                        </label>
                        <a href="#" class="text-[12px] text-gray-400 hover:text-gray-700 transition-colors">
                            Forgot password?
                        </a>
                    </div>
                    <input formControlName="password" type="password" autocomplete="current-password"
                        [class.border-red-400]="isFieldInvalid('password')" class="w-full h-11 border border-gray-200 rounded-[10px] px-3.5 text-sm text-gray-900 bg-white outline-none transition-all
                     focus:border-[#2C2C2A] focus:ring-2 focus:ring-[#2C2C2A]/[0.07]">
                    <p *ngIf="isFieldInvalid('password')" class="mt-1.5 text-[12px] text-red-600 font-medium">
                        Password is required
                    </p>
                </div>

                <!-- Submit -->
                <button type="submit" [disabled]="!loginForm.valid || isSubmitting"
                    class="mt-2 w-full h-11 rounded-[10px] bg-[#2C2C2A] text-[#F1EFE8] text-sm font-medium flex items-center justify-center gap-2
                   hover:bg-[#444441] active:scale-[0.99] disabled:opacity-50 disabled:cursor-not-allowed transition-all">
                    <span *ngIf="isSubmitting"
                        class="w-3.5 h-3.5 border-2 border-[#F1EFE8]/30 border-t-[#F1EFE8] rounded-full animate-spin"></span>
                    Sign in
                </button>

            </form>

            <!-- Divider -->
            <div class="flex items-center gap-3 my-6">
                <div class="flex-1 h-px bg-gray-100"></div>
                <span class="text-[12px] text-gray-400 tracking-[0.2px]">New member?</span>
                <div class="flex-1 h-px bg-gray-100"></div>
            </div>

            <!-- Register -->

            <a routerLink="/register" href="/register"
                class="w-full h-11 border border-gray-200 rounded-[10px] text-sm text-gray-700 font-normal flex items-center justify-center hover:bg-gray-50 hover:border-gray-300 transition-all">
                Create an account
            </a>

        </div>

    </div>

</div>
